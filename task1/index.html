<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .quiz-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
        }
        .question {
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .correct {
            background-color: #4CAF50;
            color: white;
        }
        .wrong {
            background-color: #f44336;
            color: white;
        }
        .hide {
            display: none;
        }
        #next-btn {
            background-color: #2196F3;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div id="question-text" class="question"></div>
        <div id="answer-buttons"></div>
        <button id="next-btn" class="btn hide">Next</button>
    </div>
    <div id="result-container" class="quiz-container hide">
        <div id="score-text"></div>
    </div>
    <script src="index.js"></script>
</body>
</html>
