<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Progress UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main style="padding: 2rem; display: grid; gap: 1.5rem; min-height: 100vh;">
    <section class="course-card">
      <h1 style="margin-bottom: 1rem; color: var(--accent-primary);">Design System Course</h1>
      <p style="margin-bottom: 1rem; color: #94a3b8;">Learn modern interface design patterns and glassmorphism UI.</p>
      <div class="progress-container">
        <div class="progress-fill" style="width: 70%;"></div>
      </div>
      <p style="margin-top: 0.75rem; color: #94a3b8;">70% complete</p>
    </section>

    <section class="course-card">
      <h1 style="margin-bottom: 1rem; color: var(--accent-success);">JavaScript Mastery</h1>
      <p style="margin-bottom: 1rem; color: #94a3b8;">Build interactive web apps with modern JavaScript.</p>
      <div class="progress-container">
        <div class="progress-fill" style="width: 45%; background: var(--accent-success);"></div>
      </div>
      <p style="margin-top: 0.75rem; color: #94a3b8;">45% complete</p>
    </section>
  </main>
</body>
</html>
